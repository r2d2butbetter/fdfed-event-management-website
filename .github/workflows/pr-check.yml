name: Pull Request Check

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  validate:
    name: Validate Code and Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.19.0'

      - name: Install Dependencies and Prepare Frontend
        run: |
          cd client
          npm install

      - name: Test Frontend
        run: |
          cd client
          npm test

      - name: Install Dependencies and Test Backend
        run: |
          cd server
          npm ci --include=optional
          if [ ! -d "node_modules/@rolldown/binding-linux-x64-gnu" ]; then
            ROLLDOWN_VERSION=$(node -p "require('./node_modules/rolldown/package.json').version")
            npm i --no-save @rolldown/binding-linux-x64-gnu@${ROLLDOWN_VERSION}
          fi
          npm test
